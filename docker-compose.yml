version: "3.8"

services:
  moex_tradebot:
    build: .
    container_name: moex_tradebot
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TZ=Europe/Moscow
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
